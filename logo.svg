<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c73b8c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7d3c98;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Háttér kör -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#grad)" stroke-width="8"/>
  
  <!-- Autó sziluett -->
  <g transform="translate(100, 100)">
    <!-- Karosszéria -->
    <rect x="-50" y="-15" width="100" height="35" rx="8" fill="url(#grad)"/>
    <!-- Tető -->
    <rect x="-30" y="-35" width="60" height="22" rx="6" fill="url(#grad)"/>
    <!-- Első szélvédő -->
    <rect x="-30" y="-35" width="20" height="22" rx="4" fill="url(#grad)" opacity="0.7"/>
    <!-- Hátsó szélvédő -->
    <rect x="10" y="-35" width="20" height="22" rx="4" fill="url(#grad)" opacity="0.7"/>
    <!-- Kerekek -->
    <circle cx="-30" cy="20" r="12" fill="#1a1a2e" stroke="url(#grad)" stroke-width="3"/>
    <circle cx="-30" cy="20" r="5" fill="#c73b8c"/>
    <circle cx="30" cy="20" r="12" fill="#1a1a2e" stroke="url(#grad)" stroke-width="3"/>
    <circle cx="30" cy="20" r="5" fill="#c73b8c"/>
    <!-- Fényszórók -->
    <circle cx="-48" cy="-5" r="4" fill="#ffd700" opacity="0.8"/>
    <circle cx="48" cy="-5" r="4" fill="#ff4500" opacity="0.8"/>
  </g>
  
  <!-- "A" betű a logóban -->
  <text x="100" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="url(#grad)">A</text>
</svg>